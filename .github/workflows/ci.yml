name: CI

on:
  workflow_dispatch:
  pull_request:
  push:

env:
  FOXAR_VERSION: "1.0.9"

jobs:
  ci:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Foxar
        run: curl -L https://github.com/bchainhub/foxar/releases/download/${{ env.FOXAR_VERSION }}/foxar_${{ env.FOXAR_VERSION }}_linux_amd64.tar.gz | tar xz -C /usr/local/bin

      - name: Build
        run: |
          output=$(spark build --skip test)
          if echo "$output" | grep -q "Warning"; then
            echo "$output"
            exit 1
          fi

      - name: Test
        run: spark test -vvv

      - name: Check formatting
        run: spark fmt --check

  release:
    if: github.ref == 'refs/heads/main'
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Bump version and push tag
        id: tag
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.new_tag }}
          generate_release_notes: true
